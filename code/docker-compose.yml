services:
  api:
    build:
      context: ./backend
    ports:
      - "8200:8000"
    volumes:
      - ./backend/app:/app/app
      - ../models:/app/models
      - ../data:/app/data:ro
    environment:
      - MODEL_PATH=models/production/model_efficientnet_b0_v2.pt
      - DATASET_PATH=/app/data/subset
      - LOW_CONFIDENCE_THRESHOLD=0.5
      - DATABASE_URL=postgresql://skin:${POSTGRES_PASSWORD:-skin_pass}@postgres:5432/skinlesion
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_SECURE=false
      - MINIO_BUCKET_PREDICTIONS=predictions
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_NAME=skin_lesion_classifier
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin-secret}
      - PREFECT_API_URL=http://prefect-server:4200/api
      - KAFKA_BROKER=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3100:3000"
    environment:
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=skin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-skin_pass}
      - POSTGRES_DB=skinlesion
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skin -d skinlesion"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    build:
      context: ./mlflow
    environment:
      - BACKEND_STORE_URI=postgresql://skin:${POSTGRES_PASSWORD:-skin_pass}@postgres:5432/mlflow
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "5000:5000"
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:2-python3.11
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    restart: unless-stopped

  prefect-worker:
    build:
      context: .
      dockerfile: prefect/Dockerfile
    volumes:
      - ./backend/app:/app/app
      - ../data:/app/data:ro
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - DATABASE_URL=postgresql://skin:${POSTGRES_PASSWORD:-skin_pass}@postgres:5432/skinlesion
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_NAME=skin_lesion_classifier
      - DATASET_PATH=/app/data/subset
    depends_on:
      - prefect-server
      - postgres
      - mlflow
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.1
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    restart: unless-stopped

  consumer:
    build:
      context: ./backend
    command: python -m app.consumer.prediction_consumer
    volumes:
      - ./backend/app:/app/app
    environment:
      - DATABASE_URL=postgresql://skin:${POSTGRES_PASSWORD:-skin_pass}@postgres:5432/skinlesion
      - KAFKA_BROKER=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  grafana_data:
  mlflow_data:
  prefect_data:
